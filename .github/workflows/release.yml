name: Release

# Runs on push to main (archive only) and on 'v*' tags (archive + ASC upload).
# Also triggerable manually via workflow_dispatch.
#
# Required secrets — configure in repo Settings > Secrets & variables > Actions:
#
#   Signing:
#     BUILD_CERTIFICATE_BASE64              base64 App Store Distribution .p12
#     BUILD_CERTIFICATE_P12_PASSWORD        password for the .p12
#     KEYCHAIN_PASSWORD                     any strong random string (CI-only keychain)
#     APPLE_TEAM_ID                         10-char Developer Team ID (e.g. ABC123XYZ4)
#     APP_PROVISION_PROFILE_BASE64          App Store profile — com.antimatterstudios.diskjockey
#     EXT4_PROVISION_PROFILE_BASE64         App Store profile — …diskjockey.ext4
#     NTFS_PROVISION_PROFILE_BASE64         App Store profile — …diskjockey.ntfs
#     FILEPROVIDER_PROVISION_PROFILE_BASE64 App Store profile — …diskjockey.fileprovider
#     AGENT_PROVISION_PROFILE_BASE64        App Store profile — …diskjockey.agent
#
#   App Store Connect upload (set these when ready to enable TestFlight uploads):
#     APP_STORE_CONNECT_KEY_ID              ASC API key ID
#     APP_STORE_CONNECT_ISSUER_ID           ASC API issuer ID
#     APP_STORE_CONNECT_API_KEY             base64-encoded ASC API private key (.p8 file)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  archive:
    name: Archive & Export
    runs-on: macos-26
    env:
      KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
      ARCHIVE_PATH:  ${{ runner.temp }}/DiskJockey.xcarchive
      EXPORT_PATH:   ${{ runner.temp }}/export

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Set up Rust (aarch64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Restore vendor library cache
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: lib/
          key: vendor-${{ runner.os }}-${{ hashFiles('VENDOR_PINS.txt') }}

      - name: Restore Cargo cache
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            vendor/rust-fs-ext4/target
            vendor/rust-fs-ntfs/target
            vendor/rust-img-qcow2/target
            vendor/rust-img-vhd/target
            vendor/rust-img-vhdx/target
            vendor/rust-img-vmdk/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/rust-*/Cargo.lock', 'vendor/rust-*/rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build vendor libraries
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: make vendor-fs-ext4 vendor-fs-ntfs vendor-img-containers vendor-gonetworkfs

      - name: Generate protobuf bindings
        run: |
          if [ ! -f DiskJockeyLibrary/Protobuf/fileprovider.pb.swift ]; then
            brew install protobuf swift-protobuf
            make proto
          fi

      # ---------------------------------------------------------------------------
      # Code signing
      # ---------------------------------------------------------------------------

      - name: Import App Store Distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD:             ${{ secrets.BUILD_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD:        ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/build_cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/build_cert.p12" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow xcodebuild and codesign to use the key without prompting.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profiles
        env:
          APP_PP:          ${{ secrets.APP_PROVISION_PROFILE_BASE64 }}
          EXT4_PP:         ${{ secrets.EXT4_PROVISION_PROFILE_BASE64 }}
          NTFS_PP:         ${{ secrets.NTFS_PROVISION_PROFILE_BASE64 }}
          FILEPROVIDER_PP: ${{ secrets.FILEPROVIDER_PROVISION_PROFILE_BASE64 }}
          AGENT_PP:        ${{ secrets.AGENT_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          for name in APP EXT4 NTFS FILEPROVIDER AGENT; do
            var="${name}_PP"
            echo -n "${!var}" | base64 --decode -o "$PP_DIR/diskjockey_${name}.provisionprofile"
          done

      # ---------------------------------------------------------------------------
      # Archive
      # ---------------------------------------------------------------------------

      - name: Archive
        run: |
          xcodebuild archive \
            -project DiskJockey.xcodeproj \
            -scheme DiskJockey \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"

      # Inject the real team ID into the committed template at export time.
      - name: Export for App Store
        run: |
          sed "s/XXXXXXXXXX/${{ secrets.APPLE_TEAM_ID }}/g" \
            .github/ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload export as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskJockey-${{ github.sha }}
          path: ${{ env.EXPORT_PATH }}
          retention-days: 30

      # ---------------------------------------------------------------------------
      # App Store Connect upload
      # Runs only on 'v*' tags. Skips gracefully if ASC secrets are not yet set.
      # ---------------------------------------------------------------------------
      - name: Upload to App Store Connect (TestFlight)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ASC_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          if [ -z "$ASC_KEY_BASE64" ]; then
            echo "APP_STORE_CONNECT_API_KEY not configured — skipping ASC upload."
            echo "Set the three APP_STORE_CONNECT_* secrets when ready to submit."
            exit 0
          fi

          echo -n "$ASC_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/asc_api_key.p8"

          PKG_PATH=$(find "$EXPORT_PATH" -name '*.pkg' | head -1)
          [ -z "$PKG_PATH" ] && PKG_PATH=$(find "$EXPORT_PATH" -name '*.app' | head -1)

          xcrun altool --upload-package "$PKG_PATH" \
            --type osx \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ---------------------------------------------------------------------------
      # Cleanup — always runs so the keychain doesn't linger on a failed build
      # ---------------------------------------------------------------------------
      - name: Clean up keychain and profiles
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles"/diskjockey_*.provisionprofile
