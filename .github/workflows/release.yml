name: Release

# Runs on 'v*' tags (build + cloud-sign; uploads to the Mac App Store only when
# the repo variable MAS_SUBMIT=true). Also triggerable via workflow_dispatch.
#
# Required secrets — configure in repo Settings > Secrets & variables > Actions:
#
#   Signing — two .p12 secrets (same password):
#     APPLE_CERTIFICATE             base64 .p12: "Apple Distribution" (signs the app)
#     APPLE_INSTALLER_CERTIFICATE   base64 .p12: "Mac Installer Distribution" (signs the .pkg)
#     APPLE_CERTIFICATE_PASSWORD    password for both .p12 files
#     APPLE_TEAM_ID                 10-char Developer Team ID (e.g. ABC123XYZ4)
#
#   App Store Connect API key — REQUIRED. Cloud signing generates the provisioning
#   profiles on the fly with this key, and the same key uploads to the store:
#     APPLE_ASC_KEY_ID              ASC API key ID
#     APPLE_ASC_ISSUER_ID           ASC API issuer ID
#     APPLE_ASC_API_KEY             base64 of the ASC API private key (.p8)
#
#   The CI keychain password is generated in-pipeline (no secret). Uploads are
#   gated by the repo variable MAS_SUBMIT (set =true to actually submit).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  archive:
    name: Archive & Export
    runs-on: macos-26

    steps:
      - name: Set path variables
        run: |
          {
            echo "KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db"
            echo "ARCHIVE_PATH=$RUNNER_TEMP/DiskJockey.xcarchive"
            echo "EXPORT_PATH=$RUNNER_TEMP/export"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: |
          XCODE=$(find /Applications -maxdepth 1 -name 'Xcode*.app' -type d 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Set up Rust (aarch64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Restore vendor library cache
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: lib/
          # v2 salt busts caches saved by earlier failed runs that populated
          # lib/fs_* but not lib/bundle_* (incomplete tree → missing headers).
          key: vendor-${{ runner.os }}-v2-${{ hashFiles('VENDOR_PINS.txt', 'scripts/build-bundles.sh') }}

      - name: Restore Cargo cache
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            vendor/rust-fs-ext4/target
            vendor/rust-fs-ntfs/target
            vendor/rust-fs-erofs/target
            vendor/rust-fs-squashfs/target
            vendor/rust-img-qcow2/target
            vendor/rust-img-vhd/target
            vendor/rust-img-vhdx/target
            vendor/rust-img-vmdk/target
          key: cargo-${{ runner.os }}-${{ hashFiles('vendor/rust-*/Cargo.lock', 'vendor/rust-*/rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build vendor libraries
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        # vendor-bundles builds lib/bundle_<fs>/{libdj_<fs>_bundle.a,include/*.h}
        # (via build-bundles.sh) — the aggregator staticlibs + C headers the
        # FSKit extensions actually link/#import (e.g. fs_ntfs.h). Without it the
        # archive fails: DiskJockeyNTFS-Bridging-Header.h → 'fs_ntfs.h' not found.
        run: make vendor-fs-ext4 vendor-fs-ntfs vendor-fs-erofs vendor-fs-squashfs vendor-img-containers vendor-gonetworkfs vendor-bundles

      # ---------------------------------------------------------------------------
      # Code signing
      # ---------------------------------------------------------------------------

      - name: Import signing certificates (app + installer)
        env:
          APPLE_CERTIFICATE:              ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE:    ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_DEVELOPMENT_CERTIFICATE:  ${{ secrets.APPLE_DEVELOPMENT_CERTIFICATE }}
          P12_PASSWORD:                   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)   # CI-only keychain, never stored
          echo -n "$APPLE_CERTIFICATE"             | base64 --decode -o "$RUNNER_TEMP/app_cert.p12"
          echo -n "$APPLE_INSTALLER_CERTIFICATE"   | base64 --decode -o "$RUNNER_TEMP/installer_cert.p12"
          echo -n "$APPLE_DEVELOPMENT_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/dev_cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # app cert = Apple Distribution (signs the app); installer cert = Mac
          # Installer Distribution (signs the .pkg for the store).
          for p12 in app_cert installer_cert dev_cert; do
            security import "$RUNNER_TEMP/$p12.p12" \
              -P "$P12_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"
          done

          # Allow xcodebuild, codesign and productsign to use the keys without prompting.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productsign: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Set up App Store Connect API key (cloud signing + upload)
        env:
          ASC_KEY_ID:     ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.APPLE_ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APPLE_ASC_API_KEY }}
        run: |
          if [ -z "$ASC_KEY_BASE64" ] || [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ]; then
            echo "::error::Cloud signing needs an App Store Connect API key — set APPLE_ASC_KEY_ID, APPLE_ASC_ISSUER_ID and APPLE_ASC_API_KEY."
            exit 1
          fi
          # for xcodebuild -authenticationKeyPath (auto-generates provisioning profiles) …
          echo -n "$ASC_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/asc_key.p8"
          # … and for altool (scans this dir for AuthKey_<ID>.p8) at upload time.
          mkdir -p ~/.appstoreconnect/private_keys
          cp "$RUNNER_TEMP/asc_key.p8" ~/.appstoreconnect/private_keys/AuthKey_"${ASC_KEY_ID}".p8

      # ---------------------------------------------------------------------------
      # Archive
      # ---------------------------------------------------------------------------

      - name: Archive
        env:
          ASC_KEY_ID:    ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project DiskJockey.xcodeproj \
            -scheme DiskJockey \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_key.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      # Inject the real team ID into the committed template at export time.
      - name: Export for App Store
        env:
          ASC_KEY_ID:    ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        run: |
          sed "s/XXXXXXXXXX/${{ secrets.APPLE_TEAM_ID }}/g" \
            .github/ExportOptions.plist > "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_key.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      # ---------------------------------------------------------------------------
      # Verify signatures — fails the build if the app/pkg aren't correctly signed
      # by the expected identities. Pure inspection; nothing is submitted.
      # ---------------------------------------------------------------------------
      - name: Verify signatures
        run: |
          APP=$(find "$EXPORT_PATH" -maxdepth 3 -name '*.app' | head -1)
          PKG=$(find "$EXPORT_PATH" -maxdepth 3 -name '*.pkg' | head -1)
          echo "== app bundle: $APP =="
          if [ -n "$APP" ]; then
            codesign --verify --deep --strict --verbose=2 "$APP"
            codesign -dvvv "$APP" 2>&1 | grep -E 'Authority=|TeamIdentifier=|Identifier=' || true
          fi
          echo "== installer pkg: $PKG =="
          if [ -n "$PKG" ]; then
            pkgutil --check-signature "$PKG"
          else
            echo "::warning::no .pkg found in export"
          fi

      # ---------------------------------------------------------------------------
      # App Store Connect upload
      # Runs only on 'v*' tags. Skips gracefully if ASC secrets are not yet set.
      # ---------------------------------------------------------------------------
      - name: Upload to the Mac App Store
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          MAS_SUBMIT:    ${{ vars.MAS_SUBMIT }}
          ASC_KEY_ID:    ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
        run: |
          # Submission is OFF by default: every v* tag builds + signs, but the
          # app is only uploaded to the Mac App Store when you flip the repo
          # variable MAS_SUBMIT=true (Settings → Secrets and variables → Actions → Variables).
          if [ "${MAS_SUBMIT:-}" != "true" ]; then
            echo "MAS_SUBMIT != true — built + signed, not submitting. Set repo variable MAS_SUBMIT=true to enable."
            exit 0
          fi

          # The ASC key .p8 was already written by the setup step above.
          PKG_PATH=$(find "$EXPORT_PATH" -name '*.pkg' | head -1)
          [ -z "$PKG_PATH" ] && PKG_PATH=$(find "$EXPORT_PATH" -name '*.app' | head -1)

          xcrun altool --upload-package "$PKG_PATH" \
            --type osx \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ---------------------------------------------------------------------------
      # Cleanup — always runs so the keychain doesn't linger on a failed build
      # ---------------------------------------------------------------------------
      - name: Clean up keychain and profiles
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles"/diskjockey_*.provisionprofile
