			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "#!/bin/sh\n# Copy vendored-library VERSION.txt manifests into the app bundle so the About\n# dialog can display which vendored-library commits were linked in.\n# Prefix by parent dir name so multiple libs don't collide on the same name.\nDEST=\"${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/vendor-versions\"\nmkdir -p \"$DEST\"\nrm -f \"$DEST\"/*.txt 2>/dev/null\nfor f in \"${SRCROOT}\"/lib/*/VERSION*.txt; do\n    [ -f \"$f\" ] || continue\n    parent=$(basename \"$(dirname \"$f\")\")\n    dest=\"${parent}-$(basename \"$f\")\"\n    cp \"$f\" \"$DEST/$dest\"\n    echo \"Copied $dest to vendor-versions/\"\ndone\n";
		};
